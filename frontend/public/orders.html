<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <a href="/dashboard.html" class="brand">CoreSales CRM</a>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/contacts.html">Contacts</a>
  <a href="/products.html">Products</a>
  <a href="/orders.html" class="active">Orders</a>
  <a href="/pricing.html">Pricing</a>
  <a href="/samples.html">Samples</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
  <a href="/reports.html">Reports</a>
  <a href="/meetings.html">Meetings</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h2>Orders</h2>
    <div style="display:flex;gap:8px;">
      <label class="btn-back" style="cursor:pointer;" title="Import orders from CSV">
        ↑ Upload CSV
        <input type="file" id="csv-upload" accept=".csv" style="display:none;" onchange="importCSV(event)">
      </label>
      <button class="btn-back" onclick="downloadCSV()" title="Export orders to CSV">↓ Download CSV</button>
      <button class="btn-new" onclick="location.href='/order-edit.html'">+ New Order</button>
    </div>
  </div>
  <div id="import-status" style="display:none;padding:8px 14px;border-radius:4px;font-size:13px;margin-bottom:12px;"></div>

  <div class="status-tabs" id="status-tabs">
    <button class="status-tab active" onclick="setStatus('')">All</button>
    <button class="status-tab" onclick="setStatus('Enquiry')">Enquiry</button>
    <button class="status-tab" onclick="setStatus('Quotation Sent')">Quotation Sent</button>
    <button class="status-tab" onclick="setStatus('PI Issued')">PI Issued</button>
    <button class="status-tab" onclick="setStatus('LC Opened')">LC Opened</button>
    <button class="status-tab" onclick="setStatus('Shipped')">Shipped</button>
    <button class="status-tab" onclick="setStatus('Delivered')">Delivered</button>
    <button class="status-tab" onclick="setStatus('Cancelled')">Cancelled</button>
    <button class="status-tab" onclick="setStatus('Rejected')">Rejected</button>
  </div>

  <div class="report-paper" style="padding:0;overflow:hidden;">
    <table class="data-table">
      <thead>
        <tr>
          <th>Order No</th><th>Company</th><th>Products</th>
          <th>Total</th><th>Incoterm</th><th>Destination</th>
          <th>Status</th><th>Date</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="orders-tbody"><tr><td colspan="9" class="empty-cell">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Preview panel -->
<div class="preview-overlay" id="preview-overlay" onclick="closePreview()">
  <div class="preview-panel" id="preview-panel" onclick="event.stopPropagation()">
    <div class="preview-header">
      <span id="preview-title"></span>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm" style="background:#2e7d32;color:#fff;" onclick="printPreview()">Print / PDF</button>
        <button class="btn-sm btn-edit" id="preview-edit-btn">Edit</button>
        <button class="btn-sm" style="background:#e0e0e0;color:#444;" onclick="closePreview()">✕</button>
      </div>
    </div>
    <div class="preview-body" id="preview-body"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  let currentStatus = '';
  let _allOrders = [];
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }

  function setStatus(status) {
    currentStatus = status;
    document.querySelectorAll('.status-tab').forEach(t =>
      t.classList.toggle('active', t.textContent === (status || 'All'))
    );
    load();
  }

  function closePreview() {
    document.getElementById('preview-overlay').classList.remove('open');
  }

  function printPreview() {
    const body  = document.getElementById('preview-body').innerHTML;
    const title = document.getElementById('preview-title').textContent;

    let cs = {};
    try { cs = JSON.parse(localStorage.getItem('companySettings') || '{}'); } catch (_) {}
    const companyName    = cs.companyName    || 'CoreSales CRM';
    const companySlogan  = cs.companySlogan  || '';
    const sellerAddress  = cs.sellerAddress  || '';
    const logoBase64     = cs.logoBase64     || '';
    const bankDetails    = cs.bankDetails    || '';

    const logoHtml = logoBase64
      ? `<img src="${logoBase64}" alt="${companyName}" style="height:52px;max-width:180px;object-fit:contain;">`
      : '';

    const headerHtml = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;
                  border-bottom:2px solid #1a3a5c;padding-bottom:14px;margin-bottom:18px;">
        <div>
          ${logoHtml ? `<div style="margin-bottom:6px;">${logoHtml}</div>` : ''}
          <div style="font-size:20px;font-weight:bold;color:#1a3a5c;">${companyName}</div>
          ${companySlogan ? `<div style="font-size:11px;color:#888;margin-top:2px;font-style:italic;">${companySlogan}</div>` : ''}
          ${sellerAddress ? `<div style="font-size:11px;color:#555;margin-top:6px;white-space:pre-line;line-height:1.5;">${sellerAddress}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:bold;letter-spacing:2px;color:#1a3a5c;">ORDER SHEET</div>
          <div style="font-size:16px;font-weight:600;color:#333;margin-top:4px;">${title}</div>
          ${bankDetails ? `<div style="font-size:11px;color:#555;margin-top:10px;white-space:pre-line;line-height:1.5;text-align:right;border-top:1px solid #ddd;padding-top:8px;">${bankDetails}</div>` : ''}
        </div>
      </div>`;

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>${title}</title>
      <link rel="stylesheet" href="/css/style.css">
      <style>
        body{font-family:sans-serif;font-size:13px;color:#222;padding:24px 32px;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:5px 8px;border:1px solid #ddd;}
        th{background:#d6e4f0;text-align:left;}
        .preview-section-title{font-size:11px;font-weight:bold;text-transform:uppercase;color:#1a3a5c;
          letter-spacing:.5px;border-bottom:2px solid #e8f0fe;padding-bottom:4px;margin:14px 0 8px;}
        .preview-meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px;margin-bottom:16px;}
        .preview-meta-grid>div{display:flex;flex-direction:column;gap:2px;}
        .preview-label{font-size:10px;font-weight:bold;text-transform:uppercase;color:#999;letter-spacing:.5px;}
        .order-summary-bar{background:#1a3a5c;color:#fff;padding:8px 14px;display:flex;gap:24px;flex-wrap:wrap;border-radius:4px;margin-top:8px;}
        .order-summary-bar span{font-size:12px;}
        .order-summary-bar strong{font-size:14px;}
        .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:bold;}
        .badge-status-enquiry{background:#fff8e1;color:#e65100;}
        .badge-status-quotation-sent{background:#e3f2fd;color:#1565c0;}
        .badge-status-pi-issued{background:#e8f5e9;color:#2e7d32;}
        .badge-status-lc-opened{background:#f3e5f5;color:#6a1b9a;}
        .badge-status-shipped{background:#e0f2f1;color:#00695c;}
        .badge-status-delivered{background:#e8f5e9;color:#1b5e20;}
        .badge-status-cancelled{background:#ffebee;color:#b71c1c;}
        .badge-status-rejected{background:#4a0000;color:#fff;}
        @media print{body{padding:12px 16px;}}
      </style></head><body>
      ${headerHtml}
      ${body}
      </body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 400);
  }

  async function openPreview(id) {
    document.getElementById('preview-title').textContent = 'Loading…';
    document.getElementById('preview-body').innerHTML = '<p style="padding:16px;color:#aaa;">Loading…</p>';
    document.getElementById('preview-overlay').classList.add('open');
    document.getElementById('preview-edit-btn').onclick = () => location.href = `/order-edit.html?id=${id}`;

    try {
      const o = await api.getOrder(id);
      document.getElementById('preview-title').textContent = o.orderNo;

      const cur = esc(o.currency || 'USD');
      const fmt = (n) => (n||0).toLocaleString(undefined, {minimumFractionDigits:2});

      // Line items table — all cost columns
      const itemsHtml = (o.items||[]).length ? `
        <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:700px;">
          <thead><tr style="background:#d6e4f0;">
            <th style="padding:5px 8px;text-align:left;">Product</th>
            <th style="padding:5px 8px;text-align:right;">Qty</th>
            <th style="padding:5px 8px;">Unit</th>
            <th style="padding:5px 8px;text-align:right;">Unit Price</th>
            <th style="padding:5px 8px;text-align:right;">Drums</th>
            <th style="padding:5px 8px;text-align:right;">Bank Chg</th>
            <th style="padding:5px 8px;text-align:right;">Shipping</th>
            <th style="padding:5px 8px;text-align:right;">Commission</th>
            <th style="padding:5px 8px;text-align:right;">Unit Total</th>
            <th style="padding:5px 8px;text-align:right;">Line Total</th>
          </tr></thead>
          <tbody>
            ${(o.items||[]).map((i,idx) => `
              <tr style="background:${idx%2===0?'#fff':'#f7f9fc'};border-bottom:1px solid #e8e8e8;">
                <td style="padding:5px 8px;">${esc(i.product?.name||'—')}<br><span style="font-size:10px;color:#999;">${esc(i.product?.sku||'')}</span></td>
                <td style="padding:5px 8px;text-align:right;">${Number(i.quantity).toLocaleString()}</td>
                <td style="padding:5px 8px;">${esc(i.unit||'ton')}</td>
                <td style="padding:5px 8px;text-align:right;">${fmt(i.unitPrice)}</td>
                <td style="padding:5px 8px;text-align:right;">${fmt(i.drumsPrice)}</td>
                <td style="padding:5px 8px;text-align:right;">${fmt(i.bankCharge)}</td>
                <td style="padding:5px 8px;text-align:right;">${fmt(i.shipping)}</td>
                <td style="padding:5px 8px;text-align:right;">${fmt(i.commission)}</td>
                <td style="padding:5px 8px;text-align:right;font-weight:600;">${fmt(i.unitTotal)}</td>
                <td style="padding:5px 8px;text-align:right;font-weight:600;">${fmt(i.lineTotal)}</td>
              </tr>`).join('')}
          </tbody>
        </table></div>
        <div class="order-summary-bar" style="background:#1a3a5c;color:#fff;padding:8px 14px;display:flex;gap:24px;flex-wrap:wrap;border-radius:0 0 4px 4px;margin-top:0;font-size:12px;">
          <span>SUBTOTAL <strong>${cur} ${fmt(o.subtotalAmount)}</strong></span>
          <span>INSPECTION <strong>${cur} ${fmt(o.inspectionCharges)}</strong></span>
          <span>TAX (${o.taxRate||0}%) <strong>${cur} ${fmt((o.subtotalAmount||0)*(o.taxRate||0)/100)}</strong></span>
          <span style="margin-left:auto;">TOTAL <strong style="font-size:15px;">${cur} ${fmt(o.totalAmount)}</strong></span>
        </div>` : '<p style="color:#aaa;font-size:12px;">No line items.</p>';

      // Shipping schedule
      const ss = o.shippingSchedule || {};
      const hasShipping = Object.values(ss).some(v => v);
      const shippingHtml = hasShipping ? `
        <div class="preview-section-title">Shipping Schedule</div>
        <div class="preview-meta-grid" style="grid-template-columns:1fr 1fr 1fr;">
          ${ss.productionDate  ? `<div><span class="preview-label">Production Date</span><span>${fmtDate(ss.productionDate)}</span></div>` : ''}
          ${ss.bookingDate     ? `<div><span class="preview-label">Booking Date</span><span>${fmtDate(ss.bookingDate)}</span></div>` : ''}
          ${ss.cargoClosingDate? `<div><span class="preview-label">Cargo Closing</span><span>${fmtDate(ss.cargoClosingDate)}</span></div>` : ''}
          ${ss.etd             ? `<div><span class="preview-label">ETD</span><span>${fmtDate(ss.etd)}</span></div>` : ''}
          ${ss.eta             ? `<div><span class="preview-label">ETA</span><span>${fmtDate(ss.eta)}</span></div>` : ''}
          ${ss.deliveryDate    ? `<div><span class="preview-label">Delivery Date</span><span>${fmtDate(ss.deliveryDate)}</span></div>` : ''}
          ${ss.carrier         ? `<div><span class="preview-label">Carrier</span><span>${esc(ss.carrier)}</span></div>` : ''}
          ${ss.trackingNumber  ? `<div><span class="preview-label">Tracking No.</span><span>${esc(ss.trackingNumber)}</span></div>` : ''}
          ${ss.tags && ss.tags.length ? `<div style="grid-column:1/-1"><span class="preview-label">Tags</span><span>${ss.tags.map(t=>`<span class="badge" style="background:#e8f0fe;color:#1a3a5c;margin-right:4px;">${esc(t)}</span>`).join('')}</span></div>` : ''}
          ${ss.shipmentNotes   ? `<div style="grid-column:1/-1"><span class="preview-label">Shipment Notes</span><span style="white-space:pre-line;">${esc(ss.shipmentNotes)}</span></div>` : ''}
        </div>` : '';

      document.getElementById('preview-body').innerHTML = `
        <div class="preview-meta-grid" style="grid-template-columns:1fr 1fr 1fr;">
          <div><span class="preview-label">Company</span><span>${esc(o.contact?.company||'—')}</span></div>
          <div><span class="preview-label">Contact Name</span><span>${esc(o.contact?.name||'—')}</span></div>
          <div><span class="preview-label">Status</span><span><span class="badge badge-status-${(o.status||'').replace(/\s+/g,'-').toLowerCase()}">${esc(o.status)}</span></span></div>
          <div><span class="preview-label">Incoterm</span><span>${esc(o.incoterm||'—')}</span></div>
          <div><span class="preview-label">Currency</span><span>${cur}</span></div>
          <div><span class="preview-label">Bank Charge Method</span><span>${esc(o.bankChargeMethod||'—')}</span></div>
          <div><span class="preview-label">Port of Loading</span><span>${esc(o.portOfLoading||'—')}</span></div>
          <div><span class="preview-label">Port of Destination</span><span>${esc(o.portOfDestination||'—')}</span></div>
          <div><span class="preview-label">Created</span><span>${fmtDate(o.createdAt)}</span></div>
          ${o.proformaInvoice ? `<div><span class="preview-label">Proforma Invoice</span><span><a href="/pi-view.html?id=${o.proformaInvoice._id||o.proformaInvoice}" style="color:#2d6a9f;">View P/I →</a></span></div>` : ''}
        </div>
        <div class="preview-section-title">Line Items</div>
        ${itemsHtml}
        ${shippingHtml}
        ${o.paymentTerms && o.paymentTerms.length ? `
          <div class="preview-section-title">Remarks</div>
          <ol style="margin:0 0 12px 18px;padding:0;font-size:13px;line-height:1.7;">
            ${o.paymentTerms.map(t => `<li>${esc(t)}</li>`).join('')}
          </ol>` : ''}
        ${o.orderTerms ? `<div class="preview-section-title">Order Terms</div><p style="font-size:13px;white-space:pre-line;">${esc(o.orderTerms)}</p>` : ''}
        ${o.notes ? `<div class="preview-section-title">Notes</div><p style="font-size:13px;white-space:pre-line;">${esc(o.notes)}</p>` : ''}
        ${(() => { try { const cs = JSON.parse(localStorage.getItem('companySettings')||'{}'); return cs.bankDetails ? `<div class="preview-section-title">Bank Details</div><p style="font-size:13px;white-space:pre-line;">${esc(cs.bankDetails)}</p>` : ''; } catch(_){return '';} })()}
      `;
    } catch(err) {
      document.getElementById('preview-body').innerHTML = `<p style="padding:16px;color:#c62828;">${err.message}</p>`;
    }
  }

  const CSV_HEADERS = ['orderNo','quotationNo','company','status','currency','exchangeRate',
                       'incoterm','portOfLoading','portOfDestination','totalAmount',
                       'subtotalAmount','inspectionCharges','taxRate','bankChargeMethod','notes','createdAt','products'];

  /* ── CSV Download ── */
  function csvCell(v) {
    const s = String(v == null ? '' : v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
  }

  function downloadCSV() {
    const rows = [CSV_HEADERS];
    const activeOrders = currentStatus
      ? _allOrders.filter(o => o.status === currentStatus)
      : _allOrders;
    if (!activeOrders.length) { alert('No orders to export.'); return; }
    activeOrders.forEach(o => {
      const products = (o.items || []).map(i => i.product?.name || '').filter(Boolean).join(' | ');
      rows.push([
        o.orderNo, o.quotationNo || '', o.contact?.company || '',
        o.status, o.currency, o.exchangeRate != null ? o.exchangeRate : '',
        o.incoterm, o.portOfLoading || '', o.portOfDestination || '',
        o.totalAmount || 0, o.subtotalAmount || 0,
        o.inspectionCharges || 0, o.taxRate || 0,
        o.bankChargeMethod || '', o.notes || '',
        o.createdAt ? new Date(o.createdAt).toISOString().slice(0, 10) : '',
        products,
      ].map(csvCell).join(','));
    });
    const csv = rows.map(r => r.join ? r.join(',') : r).join('\r\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `orders_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ── CSV Upload ── */
  function parseCSV(text) {
    return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').map(line => {
      const cells = []; let cur = ''; let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
        else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cells.push(cur.trim()); return cells;
    }).filter(r => r.some(c => c));
  }

  function showImportStatus(msg, isError) {
    const el = document.getElementById('import-status');
    el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    el.style.background = isError ? '#fdecea' : '#e8f5e9';
    el.style.color = isError ? '#c62828' : '#2e7d32';
  }

  async function importCSV(event) {
    const file = event.target.files[0]; event.target.value = '';
    if (!file) return;
    const rows = parseCSV(await file.text());
    if (!rows.length) { alert('CSV file is empty.'); return; }
    const hi = rows.findIndex(r => r.some(c => c.toLowerCase() === 'company'));
    if (hi === -1) { alert('Could not find header row. Download a template first.'); return; }
    const headers = rows[hi].map(h => h.toLowerCase().trim());
    const dataRows = rows.slice(hi + 1).filter(r => r.some(c => c));
    if (!dataRows.length) { alert('No data rows found.'); return; }
    if (!confirm(`Import ${dataRows.length} order(s)? Line items must be added manually after import.`)) return;

    // Build a company → contactId lookup
    let contacts = [];
    try { contacts = await api.getContacts(); } catch (_) {}
    const contactMap = {};
    contacts.forEach(c => { if (c.company) contactMap[c.company.toLowerCase().trim()] = c._id; });

    showImportStatus(`Importing 0 / ${dataRows.length}…`, false);
    let imported = 0, failed = 0, skipped = 0;
    for (const row of dataRows) {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      const company = (obj.company || '').toLowerCase().trim();
      const contactId = contactMap[company];
      if (!contactId) { skipped++; continue; }

      const body = {
        contact:           contactId,
        orderNo:           obj.orderno        || undefined,
        quotationNo:       obj.quotationno    || undefined,
        status:            obj.status         || 'Enquiry',
        currency:          obj.currency       || 'USD',
        exchangeRate:      obj.exchangerate    ? parseFloat(obj.exchangerate)    : undefined,
        incoterm:          obj.incoterm       || 'FOB',
        portOfLoading:     obj.portofloading  || '',
        portOfDestination: obj.portofdestination || '',
        inspectionCharges: obj.inspectioncharges ? parseFloat(obj.inspectioncharges) : 0,
        taxRate:           obj.taxrate         ? parseFloat(obj.taxrate)         : 0,
        bankChargeMethod:  obj.bankchargemethod || '',
        notes:             obj.notes           || '',
        items:             [],
      };
      try {
        await api.createOrder(body);
        imported++;
        showImportStatus(`Importing ${imported} / ${dataRows.length}…`, false);
      } catch (_) { failed++; }
    }
    const skipMsg = skipped ? `, ${skipped} skipped (company not found)` : '';
    const failMsg = failed  ? `, ${failed} failed` : '';
    showImportStatus(`Import complete: ${imported} added${skipMsg}${failMsg}`, (imported === 0));
    await load();
  }

  async function load() {
    const tbody = document.getElementById('orders-tbody');
    tbody.innerHTML = `<tr><td colspan="9" class="empty-cell">Loading…</td></tr>`;
    try {
      const orders = await api.getOrders(currentStatus ? { status: currentStatus } : {});
      _allOrders = orders;
      if (!orders.length) { tbody.innerHTML = `<tr><td colspan="9" class="empty-cell">No orders found.</td></tr>`; return; }
      tbody.innerHTML = orders.map(o => {
        const products = (o.items||[]).map(i=>i.product?.name||'').filter(Boolean).join(', ')||'—';
        return `
          <tr style="cursor:pointer;" onclick="location.href='/order-edit.html?id=${o._id}'">
            <td><strong>${esc(o.orderNo)}</strong></td>
            <td>${esc(o.contact?.company||'—')}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(products)}">${esc(products)}</td>
            <td style="text-align:right;">${esc(o.currency||'USD')} ${(o.totalAmount||0).toLocaleString()}</td>
            <td style="text-align:center;">${esc(o.incoterm||'—')}</td>
            <td>${esc(o.portOfDestination||'—')}</td>
            <td style="text-align:center;"><span class="badge badge-status-${(o.status||'').replace(/\s+/g,'-').toLowerCase()}">${esc(o.status)}</span></td>
            <td>${fmtDate(o.createdAt)}</td>
            <td style="white-space:nowrap;" onclick="event.stopPropagation()">
              <button class="btn-sm btn-preview" onclick="openPreview('${o._id}')">Preview</button>
              <button class="btn-sm btn-edit"    onclick="location.href='/order-edit.html?id=${o._id}'">Edit</button>
            </td>
          </tr>`;
      }).join('');
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty-cell">${err.message}</td></tr>`;
    }
  }

  load();
</script>
</body>
</html>
