<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <span class="brand">CoreSales CRM</span>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/dashboard.html">Reports</a>
  <a href="/contacts.html">Contacts</a>
  <a href="/products.html" class="active">Products</a>
  <a href="/orders.html">Orders</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
  <a href="/meetings.html">Meetings</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="page-wrap" style="max-width:700px;">
  <div class="page-header">
    <h2 id="page-title">New Product</h2>
    <button class="btn-back" onclick="location.href='/products.html'">← Back</button>
  </div>

  <div class="report-paper">
    <div class="form-grid-2">
      <div class="form-group" style="grid-column:1/-1"><label>Product Name *</label><input id="f-name" type="text" placeholder="e.g. Amino Silicone Fluid 8000cst"></div>
      <div class="form-group"><label>SKU</label><input id="f-sku" type="text" placeholder="e.g. ASF-8000"></div>
      <div class="form-group"><label>Category</label><input id="f-category" type="text" placeholder="e.g. Silicone Fluid"></div>
      <div class="form-group"><label>Grade</label><input id="f-grade" type="text" placeholder="e.g. Textile Grade"></div>
      <div class="form-group"><label>CAS Number</label><input id="f-cas" type="text" placeholder="e.g. 63148-62-9"></div>
      <div class="form-group"><label>Unit of Measure</label>
        <select id="f-unit" class="select-input">
          <option value="ton">ton</option>
          <option value="kg">kg</option>
          <option value="L">L</option>
        </select>
      </div>
      <div class="form-group"><label>Base Price (USD per unit)</label><input id="f-price" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <label>Price Last Updated</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="price-date" style="font-size:12px;color:#777;">—</span>
          <button type="button" class="btn-sm btn-edit" onclick="markPriceUpdated()">Mark Today</button>
        </div>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>Price Link Note</label>
        <input id="f-price-note" type="text" placeholder="e.g. Pegged to DMC spot price +8%">
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>Packaging Types (comma-separated)</label>
        <input id="f-packaging" type="text" placeholder="e.g. 200L Drum, ISO Tank, Flexi-bag">
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>Technical Notes / Grade Specifications</label>
        <textarea id="f-tech" rows="5" placeholder="Viscosity, pH, flash point, appearance, application details…"></textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;">
        <input id="f-active" type="checkbox" checked style="width:auto;">
        <label for="f-active" style="margin:0;">Active (visible in catalog)</label>
      </div>
    </div>

    <div id="save-status" class="save-status" style="margin:12px 0;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn-save" onclick="save()">Save Product</button>
      <button class="btn-back" onclick="location.href='/products.html'">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  const params = new URLSearchParams(location.search);
  let productId = params.get('id') || null;
  let priceLastUpdated = null;

  function showStatus(msg, isError) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status' + (isError ? ' error' : '');
    if (!isError) setTimeout(() => el.textContent = '', 3000);
  }

  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }

  function markPriceUpdated() {
    priceLastUpdated = new Date().toISOString();
    document.getElementById('price-date').textContent = 'Today';
  }

  async function save() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showStatus('Product name is required.', true); return; }
    const body = {
      name,
      sku:              document.getElementById('f-sku').value.trim() || undefined,
      category:         document.getElementById('f-category').value.trim(),
      grade:            document.getElementById('f-grade').value.trim(),
      casNumber:        document.getElementById('f-cas').value.trim(),
      unitOfMeasure:    document.getElementById('f-unit').value,
      basePrice:        parseFloat(document.getElementById('f-price').value) || undefined,
      priceLinkNote:    document.getElementById('f-price-note').value.trim(),
      packagingTypes:   document.getElementById('f-packaging').value.split(',').map(s=>s.trim()).filter(Boolean),
      technicalNotes:   document.getElementById('f-tech').value.trim(),
      isActive:         document.getElementById('f-active').checked,
    };
    if (priceLastUpdated) body.priceLastUpdated = priceLastUpdated;
    try {
      const result = productId
        ? await api.updateProduct(productId, body)
        : await api.createProduct(body);
      productId = result._id;
      document.getElementById('page-title').textContent = result.name;
      showStatus('Saved!');
    } catch (err) { showStatus(err.message, true); }
  }

  async function load() {
    if (!productId) return;
    try {
      const p = await api.getProduct(productId);
      document.getElementById('page-title').textContent = p.name;
      document.getElementById('f-name').value      = p.name        || '';
      document.getElementById('f-sku').value       = p.sku         || '';
      document.getElementById('f-category').value  = p.category    || '';
      document.getElementById('f-grade').value     = p.grade       || '';
      document.getElementById('f-cas').value       = p.casNumber   || '';
      document.getElementById('f-unit').value      = p.unitOfMeasure || 'ton';
      document.getElementById('f-price').value     = p.basePrice   || '';
      document.getElementById('f-price-note').value= p.priceLinkNote || '';
      document.getElementById('f-packaging').value = (p.packagingTypes || []).join(', ');
      document.getElementById('f-tech').value      = p.technicalNotes || '';
      document.getElementById('f-active').checked  = p.isActive !== false;
      document.getElementById('price-date').textContent = fmtDate(p.priceLastUpdated);
      priceLastUpdated = p.priceLastUpdated || null;
    } catch (err) { alert(err.message); }
  }

  load();
</script>
</body>
</html>
