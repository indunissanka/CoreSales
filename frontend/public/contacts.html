<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <span class="brand">CoreSales CRM</span>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/dashboard.html">Reports</a>
  <a href="/contacts.html" class="active">Contacts</a>
  <a href="/products.html">Products</a>
  <a href="/orders.html">Orders</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h2>Contacts</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <input type="text" id="search-input" class="search-input" placeholder="Search company or name…" oninput="filterContacts()">
      <label class="btn-back" style="cursor:pointer;" title="Import contacts from CSV">
        ↑ Upload CSV
        <input type="file" id="csv-upload" accept=".csv" style="display:none;" onchange="importCSV(event)">
      </label>
      <button class="btn-back" onclick="downloadCSV()" title="Export contacts to CSV">↓ Download CSV</button>
      <button class="btn-new" onclick="location.href='/contact-detail.html'">+ New Contact</button>
    </div>
  </div>

  <div id="import-status" style="display:none;" class="import-status-bar"></div>

  <div class="reports-grid" id="contacts-grid">
    <div class="empty-state"><p>Loading…</p></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;

  function logout() { localStorage.clear(); location.replace('/index.html'); }

  let allContacts = [];

  const CSV_HEADERS = ['company','name','role','email','phone','country','city','notes'];

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function filterContacts() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = q
      ? allContacts.filter(c => (c.company + c.name).toLowerCase().includes(q))
      : allContacts;
    renderContacts(filtered);
  }

  function renderContacts(contacts) {
    const grid = document.getElementById('contacts-grid');
    if (!contacts.length) {
      grid.innerHTML = `<div class="empty-state"><p>No contacts found.</p></div>`;
      return;
    }
    grid.innerHTML = contacts.map(c => `
      <div class="report-card" onclick="location.href='/contact-detail.html?id=${c._id}'">
        <div class="week-label">${esc(c.company)}</div>
        <div class="meta">${esc(c.name)}</div>
        <div class="meta" style="display:flex;gap:8px;align-items:center;margin-top:4px;">
          <span class="badge badge-role">${esc(c.role || 'Other')}</span>
          <span style="color:#aaa">${esc(c.country || '')}</span>
        </div>
        ${c.phone ? `<div class="meta" style="margin-top:4px;">📱 ${esc(c.phone)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-sm btn-edit" onclick="event.stopPropagation();location.href='/contact-detail.html?id=${c._id}'">Edit</button>
          <button class="btn-sm btn-delete" onclick="event.stopPropagation();deleteContact('${c._id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteContact(id) {
    if (!confirm('Delete this contact?')) return;
    try {
      await api.deleteContact(id);
      allContacts = allContacts.filter(c => c._id !== id);
      filterContacts();
    } catch (err) { alert(err.message); }
  }

  /* ── CSV Download ── */
  function csvCell(v) {
    const s = String(v == null ? '' : v);
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? '"' + s.replace(/"/g, '""') + '"'
      : s;
  }

  function downloadCSV() {
    if (!allContacts.length) { alert('No contacts to export.'); return; }
    const rows = [CSV_HEADERS];
    allContacts.forEach(c => {
      rows.push(CSV_HEADERS.map(h => csvCell(c[h] || '')));
    });
    const csv = rows.map(r => r.join(',')).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'contacts.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  /* ── CSV Upload ── */
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    return lines.map(line => {
      const cells = []; let cur = ''; let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
          else inQuote = !inQuote;
        } else if (ch === ',' && !inQuote) {
          cells.push(cur.trim()); cur = '';
        } else { cur += ch; }
      }
      cells.push(cur.trim());
      return cells;
    }).filter(r => r.some(c => c));
  }

  function showImportStatus(msg, isError) {
    const el = document.getElementById('import-status');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
    el.style.background = isError ? '#fdecea' : '#e8f5e9';
    el.style.color      = isError ? '#c62828' : '#2e7d32';
  }

  async function importCSV(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;

    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length) { alert('CSV file is empty.'); return; }

    // Find header row — look for a row containing "company" (case-insensitive)
    const headerIdx = rows.findIndex(r => r.some(c => c.toLowerCase() === 'company'));
    if (headerIdx === -1) {
      alert('Could not find header row.\nMake sure the CSV has a "company" column header.\nDownload the template first to see the expected format.');
      return;
    }

    const headers = rows[headerIdx].map(h => h.toLowerCase().trim());
    const dataRows = rows.slice(headerIdx + 1).filter(r => r.some(c => c));

    if (!dataRows.length) { alert('No data rows found after the header.'); return; }

    if (!confirm(`Import ${dataRows.length} contact(s) from CSV?\nThis will ADD them to your existing contacts.`)) return;

    showImportStatus(`Importing 0 / ${dataRows.length}…`, false);

    let imported = 0, failed = 0;
    for (const row of dataRows) {
      const obj = {};
      headers.forEach((h, i) => { if (CSV_HEADERS.includes(h)) obj[h] = row[i] || ''; });
      if (!obj.company || !obj.name) { failed++; continue; }
      try {
        await api.createContact(obj);
        imported++;
        showImportStatus(`Importing ${imported} / ${dataRows.length}…`, false);
      } catch (e) { failed++; }
    }

    const msg = `Import complete: ${imported} added${failed ? `, ${failed} skipped (missing company/name)` : ''}.`;
    showImportStatus(msg, failed > 0 && imported === 0);
    await load();
  }

  async function load() {
    try {
      allContacts = await api.getContacts();
      filterContacts();
    } catch (err) {
      document.getElementById('contacts-grid').innerHTML =
        `<div class="empty-state"><p>${err.message}</p></div>`;
    }
  }

  load();
</script>
</body>
</html>
