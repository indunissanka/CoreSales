<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <a href="/dashboard.html" class="brand">CoreSales CRM</a>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/contacts.html" class="active">Contacts</a>
  <a href="/products.html">Products</a>
  <a href="/orders.html">Orders</a>
  <a href="/pricing.html">Pricing</a>
  <a href="/samples.html">Samples</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
  <a href="/reports.html">Reports</a>
  <a href="/meetings.html">Meetings</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="page-wrap" style="max-width:1100px;">
  <div class="page-header">
    <h2 id="page-title">New Contact</h2>
    <div style="display:flex;gap:10px;">
      <button class="btn-back" onclick="location.href='/contacts.html'">← Back</button>
      <button class="btn-new" onclick="location.href='/order-edit.html?contactId='+contactId">+ New Order</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

    <!-- Left: contact form -->
    <div class="report-paper">
      <h3 style="color:#1a3a5c;margin-bottom:16px;font-size:14px;">Contact Details</h3>
      <div class="form-grid-2">
        <div class="form-group"><label>Company *</label><input id="f-company" type="text"></div>
        <div class="form-group"><label>Contact Name *</label><input id="f-name" type="text"></div>
        <div class="form-group"><label>Role</label>
          <select id="f-role" class="select-input">
            <option>Purchasing Manager</option>
            <option>Lab Technician</option>
            <option>Director</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Email</label><input id="f-email" type="email"></div>
        <div class="form-group"><label>Phone / WhatsApp</label><input id="f-phone" type="text"></div>
        <div class="form-group"><label>Country</label><input id="f-country" type="text" value="Bangladesh"></div>
        <div class="form-group"><label>City</label><input id="f-city" type="text"></div>
        <div class="form-group" style="grid-column:1/-1"><label>Notes</label><textarea id="f-notes" rows="3"></textarea></div>
      </div>
      <div id="save-status" class="save-status" style="margin-bottom:8px;"></div>
      <button class="btn-save" onclick="saveContact()">Save Contact</button>
    </div>

    <!-- Right: comm log -->
    <div>
      <div class="report-paper" style="margin-bottom:16px;">
        <h3 style="color:#1a3a5c;margin-bottom:12px;font-size:14px;">Communication Log</h3>
        <div id="comm-log-list" style="max-height:300px;overflow-y:auto;margin-bottom:12px;">
          <p style="color:#aaa;font-size:12px;">Save the contact first to add logs.</p>
        </div>

        <details id="add-log-panel">
          <summary style="cursor:pointer;font-size:13px;font-weight:bold;color:#1a3a5c;margin-bottom:8px;">+ Add Communication Log</summary>
          <div class="form-grid-2" style="margin-top:8px;">
            <div class="form-group"><label>Date</label><input id="log-date" type="date"></div>
            <div class="form-group"><label>Channel</label>
              <select id="log-channel" class="select-input">
                <option>WhatsApp</option><option>Email</option><option>Phone</option><option>In-Person</option>
              </select>
            </div>
            <div class="form-group"><label>Direction</label>
              <select id="log-direction" class="select-input">
                <option>Outbound</option><option>Inbound</option>
              </select>
            </div>
            <div class="form-group" style="grid-column:1/-1"><label>Summary *</label>
              <textarea id="log-summary" rows="2" placeholder="Brief summary of the conversation…"></textarea>
            </div>
          </div>
          <button class="btn-add-row" onclick="addCommLog()">Add Log</button>
        </details>
      </div>

      <!-- Linked orders -->
      <div class="report-paper">
        <h3 style="color:#1a3a5c;margin-bottom:12px;font-size:14px;">Orders</h3>
        <div id="orders-list"><p style="color:#aaa;font-size:12px;">No orders yet.</p></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  const params = new URLSearchParams(location.search);
  let contactId = params.get('id') || null;

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }

  function showStatus(msg, isError) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status' + (isError ? ' error' : '');
    if (!isError) setTimeout(() => el.textContent = '', 3000);
  }

  async function saveContact() {
    const body = {
      company: document.getElementById('f-company').value.trim(),
      name:    document.getElementById('f-name').value.trim(),
      role:    document.getElementById('f-role').value,
      email:   document.getElementById('f-email').value.trim(),
      phone:   document.getElementById('f-phone').value.trim(),
      country: document.getElementById('f-country').value.trim(),
      city:    document.getElementById('f-city').value.trim(),
      notes:   document.getElementById('f-notes').value.trim(),
    };
    if (!body.company || !body.name) { showStatus('Company and name are required.', true); return; }
    try {
      const result = contactId
        ? await api.updateContact(contactId, body)
        : await api.createContact(body);
      contactId = result._id;
      document.getElementById('page-title').textContent = result.company;
      showStatus('Saved!');
    } catch (err) { showStatus(err.message, true); }
  }

  async function addCommLog() {
    if (!contactId) { alert('Save the contact first.'); return; }
    const summary = document.getElementById('log-summary').value.trim();
    if (!summary) { alert('Summary is required.'); return; }
    const body = {
      date:      document.getElementById('log-date').value || new Date().toISOString(),
      channel:   document.getElementById('log-channel').value,
      direction: document.getElementById('log-direction').value,
      summary,
    };
    try {
      const contact = await api.addCommLog(contactId, body);
      renderCommLog(contact.commHistory);
      document.getElementById('log-summary').value = '';
    } catch (err) { alert(err.message); }
  }

  async function deleteLog(logId) {
    if (!confirm('Remove this log entry?')) return;
    try {
      const contact = await api.deleteCommLog(contactId, logId);
      renderCommLog(contact.commHistory);
    } catch (err) { alert(err.message); }
  }

  const CHANNEL_COLORS = { WhatsApp:'#25d366', Email:'#1a73e8', Phone:'#ff6d00', 'In-Person':'#9c27b0' };

  function renderCommLog(logs) {
    const el = document.getElementById('comm-log-list');
    if (!logs || !logs.length) { el.innerHTML = '<p style="color:#aaa;font-size:12px;">No logs yet.</p>'; return; }
    const sorted = [...logs].sort((a,b) => new Date(b.date) - new Date(a.date));
    el.innerHTML = sorted.map(l => `
      <div style="border-bottom:1px solid #eee;padding:8px 0;display:flex;gap:10px;align-items:flex-start;">
        <div style="flex:1;">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:3px;">
            <span style="background:${CHANNEL_COLORS[l.channel]||'#666'};color:#fff;border-radius:3px;padding:1px 7px;font-size:10px;">${esc(l.channel)}</span>
            <span style="font-size:10px;color:#888;">${l.direction === 'Outbound' ? '↑' : '↓'} ${fmtDate(l.date)}</span>
          </div>
          <div style="font-size:12px;">${esc(l.summary)}</div>
        </div>
        <button class="btn-del-row" onclick="deleteLog('${l._id}')" title="Remove">×</button>
      </div>
    `).join('');
  }

  function renderOrders(orders) {
    const el = document.getElementById('orders-list');
    if (!orders || !orders.length) { el.innerHTML = '<p style="color:#aaa;font-size:12px;">No orders yet.</p>'; return; }
    el.innerHTML = `<table style="width:100%;font-size:12px;border-collapse:collapse;">
      <thead><tr style="background:#f0f4f8;">
        <th style="padding:4px 8px;text-align:left;">Order No</th>
        <th style="padding:4px 8px;">Status</th>
        <th style="padding:4px 8px;text-align:right;">Total</th>
      </tr></thead>
      <tbody>${orders.map(o => `
        <tr onclick="location.href='/order-edit.html?id=${o._id}'" style="cursor:pointer;border-bottom:1px solid #eee;">
          <td style="padding:4px 8px;">${esc(o.orderNo)}</td>
          <td style="padding:4px 8px;text-align:center;"><span class="badge badge-status-${(o.status||'').replace(/\s+/g,'-').toLowerCase()}">${esc(o.status)}</span></td>
          <td style="padding:4px 8px;text-align:right;">${o.currency} ${(o.totalAmount||0).toLocaleString()}</td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  async function load() {
    if (!contactId) return;
    try {
      const [contact, orders] = await Promise.all([
        api.getContact(contactId),
        api.getOrders({ contactId }),
      ]);
      document.getElementById('page-title').textContent = contact.company;
      document.getElementById('f-company').value = contact.company || '';
      document.getElementById('f-name').value    = contact.name    || '';
      document.getElementById('f-role').value    = contact.role    || 'Other';
      document.getElementById('f-email').value   = contact.email   || '';
      document.getElementById('f-phone').value   = contact.phone   || '';
      document.getElementById('f-country').value = contact.country || '';
      document.getElementById('f-city').value    = contact.city    || '';
      document.getElementById('f-notes').value   = contact.notes   || '';
      renderCommLog(contact.commHistory);
      renderOrders(orders);
    } catch (err) { alert(err.message); }
  }

  // Pre-fill today's date in comm log
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];

  load();
</script>
</body>
</html>
