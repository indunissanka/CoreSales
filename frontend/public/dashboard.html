<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Sales Weekly Report</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <span class="brand">Sales Weekly Report</span>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h2>My Weekly Reports</h2>
    <button class="btn-new" onclick="newReport()">+ New Report</button>
  </div>

  <div class="reports-grid" id="reports-grid">
    <div class="empty-state">
      <p>Loading reports…</p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');

  document.getElementById('topbar-name').textContent = user.name || user.username;

  function logout() {
    localStorage.clear();
    location.replace('/index.html');
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function newReport() {
    location.href = '/report.html';
  }

  function editReport(id, e) {
    e.stopPropagation();
    location.href = `/report.html?id=${id}`;
  }

  async function deleteReport(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this report? This cannot be undone.')) return;
    try {
      await api.deleteReport(id);
      loadReports();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function loadReports() {
    const grid = document.getElementById('reports-grid');
    try {
      const reports = await api.getReports();
      if (!reports.length) {
        grid.innerHTML = `<div class="empty-state"><p>No reports yet.</p><small>Click "+ New Report" to create your first weekly report.</small></div>`;
        return;
      }
      grid.innerHTML = reports.map(r => `
        <div class="report-card" onclick="location.href='/report.html?id=${r._id}'">
          <div class="week-label">${fmtDate(r.weekStart)} – ${fmtDate(r.weekEnd)}</div>
          <div class="meta">Area: ${r.area || '—'}</div>
          <div class="meta">Filled by: ${r.formFiller || '—'}</div>
          <span class="entry-count">${(r.entries || []).length} entries</span>
          <div class="card-actions">
            <button class="btn-sm btn-edit"   onclick="editReport('${r._id}', event)">Edit</button>
            <button class="btn-sm btn-delete" onclick="deleteReport('${r._id}', event)">Delete</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      if (err.message.includes('401') || err.message.toLowerCase().includes('token')) {
        logout();
      } else {
        grid.innerHTML = `<div class="empty-state"><p>Failed to load reports.</p><small>${err.message}</small></div>`;
      }
    }
  }

  loadReports();
</script>
</body>
</html>
