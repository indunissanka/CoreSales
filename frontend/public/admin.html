<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 900px) {
      .admin-grid { grid-template-columns: 300px 1fr; align-items: start; }
    }

    .admin-card {
      background: #fff;
      border: 1px solid #d0d8e4;
      border-radius: 14px;
      overflow: hidden;
    }
    .admin-card-header {
      background: #f7f9fc;
      border-bottom: 1px solid #eef0f4;
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 700;
      color: #1a3a5c;
      text-transform: uppercase;
      letter-spacing: .6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-card-body { padding: 20px; }

    /* System settings */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; color: #333; }
    .setting-desc  { font-size: 12px; color: #888; margin-top: 2px; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 48px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 26px;
      cursor: pointer; transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: #2e7d32; }
    .toggle-track::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      left: 3px; top: 3px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .toggle input:checked + .toggle-track::before { transform: translateX(22px); }

    /* Users table */
    .users-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .users-table th {
      background: #f0f4f8;
      color: #1a3a5c;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #d0d8e4;
      white-space: nowrap;
    }
    .users-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f4f8;
      vertical-align: middle;
    }
    .users-table tbody tr:hover td { background: #f7f9fc; }
    .users-table tbody tr:last-child td { border-bottom: none; }

    .role-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }
    .role-admin { background: #e8f0fe; color: #1a3a5c; }
    .role-user  { background: #f5f5f5; color: #555; }
    .status-active   { color: #2e7d32; font-weight: 700; font-size: 12px; }
    .status-inactive { color: #c62828; font-weight: 700; font-size: 12px; }

    .action-btns { display: flex; gap: 6px; flex-wrap: nowrap; }

    /* Create user form */
    .create-form { display: flex; flex-direction: column; gap: 12px; }
    .create-form .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .create-form .form-row.full { grid-template-columns: 1fr; }
    .create-form label { font-size: 12px; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
    .create-form input, .create-form select {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }
    .create-form input:focus, .create-form select:focus { border-color: #2d6a9f; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      width: min(460px, 94vw);
      box-shadow: 0 16px 48px rgba(0,0,0,.25);
      animation: modal-in .15s ease;
    }
    @keyframes modal-in { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
    .modal-header {
      background: #1a3a5c;
      color: #fff;
      padding: 16px 20px;
      border-radius: 14px 14px 0 0;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .modal-footer { padding: 0 20px 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .modal-body label { font-size: 12px; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
    .modal-body input, .modal-body select {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
    }
    .modal-body input:focus, .modal-body select:focus { border-color: #2d6a9f; }

    .btn-close-modal {
      background: none; border: none; color: #fff;
      font-size: 20px; cursor: pointer; opacity: .8; line-height: 1;
    }
    .btn-close-modal:hover { opacity: 1; }

    .status-msg {
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status-msg.error   { background: #fdecea; color: #c62828; display: block; }

    .empty-users { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<header class="mobile-header">
  <button class="mh-back" onclick="location.href='/settings.html'">‹</button>
  <span class="mh-title">Admin Panel</span>
  <div class="mh-actions">
    <span class="mh-user" id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>
<nav class="bottom-nav">
  <a href="/contacts.html" class="bn-item"><span class="bn-icon">👥</span><span class="bn-label">Contacts</span></a>
  <a href="/orders.html" class="bn-item"><span class="bn-icon">📋</span><span class="bn-label">Orders</span></a>
  <a href="/products.html" class="bn-item"><span class="bn-icon">🧪</span><span class="bn-label">Products</span></a>
  <a href="/pricing.html" class="bn-item"><span class="bn-icon">💰</span><span class="bn-label">Pricing</span></a>
  <a href="/samples.html" class="bn-item"><span class="bn-icon">🧫</span><span class="bn-label">Samples</span></a>
  <a href="/lc-tracker.html" class="bn-item"><span class="bn-icon">📄</span><span class="bn-label">Trade Docs</span></a>
  <a href="/forecast.html" class="bn-item"><span class="bn-icon">📈</span><span class="bn-label">Forecast</span></a>
  <a href="/reports.html" class="bn-item"><span class="bn-icon">📝</span><span class="bn-label">Reports</span></a>
  <a href="/meetings.html" class="bn-item"><span class="bn-icon">📅</span><span class="bn-label">Meetings</span></a>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <h2>🛡️ Admin Panel</h2>
  </div>

  <div id="page-status" class="status-msg"></div>

  <div class="admin-grid">

    <!-- Left column: System Settings + Create User -->
    <div style="display:flex;flex-direction:column;gap:20px;">

      <!-- System Settings -->
      <div class="admin-card">
        <div class="admin-card-header">⚙️ System Settings</div>
        <div class="admin-card-body">
          <div class="setting-row">
            <div>
              <div class="setting-label">User Registration</div>
              <div class="setting-desc">Allow new users to register</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="reg-toggle" onchange="toggleRegistration(this.checked)">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Create User -->
      <div class="admin-card">
        <div class="admin-card-header">➕ Create User</div>
        <div class="admin-card-body">
          <div id="create-status" class="status-msg" style="margin-bottom:12px;"></div>
          <form class="create-form" onsubmit="createUser(event)">
            <div class="form-row">
              <div>
                <label>Username *</label>
                <input type="text" id="c-username" placeholder="e.g. jsmith" required autocomplete="off">
              </div>
              <div>
                <label>Password *</label>
                <input type="password" id="c-password" placeholder="Min 6 chars" required autocomplete="new-password">
              </div>
            </div>
            <div class="form-row">
              <div>
                <label>Full Name *</label>
                <input type="text" id="c-name" placeholder="e.g. John Smith" required>
              </div>
              <div>
                <label>Area / Region</label>
                <input type="text" id="c-area" placeholder="e.g. Asia">
              </div>
            </div>
            <div class="form-row full">
              <div>
                <label>Role</label>
                <select id="c-role">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-new" style="width:100%;margin-top:4px;">Create User</button>
          </form>
        </div>
      </div>

    </div>

    <!-- Right column: User list -->
    <div class="admin-card">
      <div class="admin-card-header">
        👤 Users
        <span id="user-count" style="font-weight:400;font-size:12px;color:#888;text-transform:none;letter-spacing:0;"></span>
      </div>
      <div style="overflow-x:auto;">
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Username</th>
              <th>Area</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="6" class="empty-users">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span>Edit User</span>
      <button class="btn-close-modal" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="e-id">
      <div id="edit-status" class="status-msg"></div>
      <div>
        <label>Full Name</label>
        <input type="text" id="e-name" placeholder="Full name">
      </div>
      <div>
        <label>Area / Region</label>
        <input type="text" id="e-area" placeholder="e.g. Asia">
      </div>
      <div>
        <label>Role</label>
        <select id="e-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select id="e-active">
          <option value="true">Active</option>
          <option value="false">Inactive (disabled)</option>
        </select>
      </div>
      <div>
        <label>New Password <span style="font-weight:400;color:#aaa;">(leave blank to keep current)</span></label>
        <input type="password" id="e-password" placeholder="New password" autocomplete="new-password">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-back" onclick="closeModal()">Cancel</button>
      <button class="btn-new" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  if (user.role !== 'admin') {
    alert('Admin access required.');
    location.replace('/dashboard.html');
  }
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }

  function showStatus(elId, msg, type) {
    const el = document.getElementById(elId);
    el.textContent = msg;
    el.className = 'status-msg ' + type;
    if (type === 'success') setTimeout(() => { el.className = 'status-msg'; }, 3000);
  }

  // ── System settings ──────────────────────────────────────────
  async function loadSystem() {
    try {
      const data = await apiFetch('/admin/system');
      document.getElementById('reg-toggle').checked = data.registrationOpen;
    } catch (err) {
      showStatus('page-status', 'Failed to load system settings: ' + err.message, 'error');
    }
  }

  async function toggleRegistration(val) {
    try {
      await apiFetch('/admin/system', { method: 'PUT', body: JSON.stringify({ registrationOpen: val }) });
      showStatus('page-status', `Registration ${val ? 'enabled' : 'disabled'}.`, 'success');
    } catch (err) {
      showStatus('page-status', 'Failed: ' + err.message, 'error');
      document.getElementById('reg-toggle').checked = !val;
    }
  }

  // ── Users ────────────────────────────────────────────────────
  let allUsers = [];

  async function loadUsers() {
    try {
      allUsers = await apiFetch('/admin/users');
      document.getElementById('user-count').textContent = `${allUsers.length} total`;
      renderUsers(allUsers);
    } catch (err) {
      document.getElementById('users-tbody').innerHTML =
        `<tr><td colspan="6" class="empty-users" style="color:#c62828;">Failed to load users: ${esc(err.message)}</td></tr>`;
    }
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-users">No users found.</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><strong>${esc(u.name)}</strong></td>
        <td style="color:#555;font-size:12px;">@${esc(u.username)}</td>
        <td style="font-size:12px;color:#666;">${esc(u.area||'—')}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td><span class="${u.isActive ? 'status-active' : 'status-inactive'}">${u.isActive ? 'Active' : 'Inactive'}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn-sm btn-edit" onclick="openEdit(${JSON.stringify(u).replace(/"/g,'&quot;')})">Edit</button>
            ${u._id !== user.id && u._id !== user._id ? `<button class="btn-sm btn-delete" onclick="deleteUser('${u._id}','${esc(u.name)}')">Delete</button>` : '<span style="font-size:11px;color:#aaa;">You</span>'}
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Create user ──────────────────────────────────────────────
  async function createUser(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      await apiFetch('/admin/users', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('c-username').value.trim(),
          password: document.getElementById('c-password').value,
          name:     document.getElementById('c-name').value.trim(),
          area:     document.getElementById('c-area').value.trim(),
          role:     document.getElementById('c-role').value,
        })
      });
      showStatus('create-status', 'User created successfully.', 'success');
      e.target.reset();
      loadUsers();
    } catch (err) {
      showStatus('create-status', err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Create User';
    }
  }

  // ── Edit user modal ──────────────────────────────────────────
  function openEdit(u) {
    document.getElementById('e-id').value       = u._id;
    document.getElementById('e-name').value     = u.name || '';
    document.getElementById('e-area').value     = u.area || '';
    document.getElementById('e-role').value     = u.role || 'user';
    document.getElementById('e-active').value   = String(u.isActive !== false);
    document.getElementById('e-password').value = '';
    document.getElementById('edit-status').className = 'status-msg';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function saveEdit() {
    const id   = document.getElementById('e-id').value;
    const body = {
      role:     document.getElementById('e-role').value,
      isActive: document.getElementById('e-active').value === 'true',
    };
    const pw = document.getElementById('e-password').value;
    if (pw) body.password = pw;

    try {
      await apiFetch(`/admin/users/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      showStatus('edit-status', 'Saved.', 'success');
      loadUsers();
      setTimeout(closeModal, 800);
    } catch (err) {
      showStatus('edit-status', err.message, 'error');
    }
  }

  // ── Delete user ──────────────────────────────────────────────
  async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    try {
      await apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
      showStatus('page-status', `User "${name}" deleted.`, 'success');
      loadUsers();
    } catch (err) {
      showStatus('page-status', err.message, 'error');
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  loadSystem();
  loadUsers();
</script>
</body>
</html>
