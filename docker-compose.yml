services:
  mongodb:
    image: mongo:7
    container_name: coresales-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: coresales
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: coresales-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/coresales?authSource=admin
      JWT_SECRET: change-this-secret-in-production
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: coresales-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
