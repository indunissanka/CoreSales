<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .todo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 4px;
    }
    .todo-card {
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #d0d8e4;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .15s;
    }
    .todo-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .todo-card-title { font-size: 14px; font-weight: 700; color: #1a3a5c; cursor: pointer; word-break: break-word; padding-right: 44px; }
    .todo-item-row { display: flex; align-items: center; gap: 8px; }
    .todo-item-row input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; cursor:pointer; }
    .todo-item-label { font-size: 13px; color: #333; cursor: pointer; }
    .todo-item-label.done { text-decoration: line-through; color: #aaa; }
    .todo-progress { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .todo-progress-bar { height: 100%; background: #2e7d32; border-radius: 3px; transition: width .3s; }
    .todo-card-date { font-size: 11px; color: #aaa; margin-top: auto; }
    .todo-pin { position: absolute; top: 10px; right: 36px; font-size: 15px; cursor: pointer; opacity: .5; }
    .todo-pin.pinned { opacity: 1; color: #e65100; }
    .todo-del { position: absolute; top: 8px; right: 10px; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; }
    .todo-del:hover { color: #c62828; }
    /* Modal */
    .todo-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
    .todo-overlay.open { display:flex; }
    .todo-modal { background:#fff; border-radius:8px; padding:28px 32px; width:520px; max-width:96vw; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.22); }
    .todo-modal h3 { margin:0 0 16px; font-size:15px; color:#1a3a5c; text-transform:uppercase; letter-spacing:1px; }
    .todo-modal label { font-size:12px; font-weight:600; color:#444; display:block; margin-bottom:3px; }
    .todo-modal input[type="text"] { width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #c0c8d4; border-radius:4px; font-size:13px; }
    .modal-items-list { display:flex; flex-direction:column; gap:6px; margin:8px 0; }
    .modal-item-row { display:flex; align-items:center; gap:8px; }
    .modal-item-row input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; }
    .modal-item-row input[type="text"] { flex:1; }
    .modal-item-del { background:none; border:none; color:#c62828; font-size:16px; cursor:pointer; padding:0 4px; }
    .color-row { display:flex; gap:8px; margin:10px 0 16px; flex-wrap:wrap; }
    .color-swatch { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
    .color-swatch.selected { border-color: #1a3a5c; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
  </style>
  <link rel="stylesheet" href="/css/mobile.css">
  <script src="/js/mobile-nav.js" defer></script>
</head>
<body>

<div class="topbar">
  <a href="/dashboard.html" class="brand">CoreSales CRM</a>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/contacts.html">Contacts</a>
  <a href="/products.html">Products</a>
  <a href="/orders.html">Orders</a>
  <a href="/pricing.html">Pricing</a>
  <a href="/samples.html">Samples</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
  <a href="/reports.html">Reports</a>
  <a href="/meetings.html">Meetings</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h2>To-Do Lists</h2>
    <button class="btn-new" onclick="openModal()">+ New List</button>
  </div>
  <div class="todo-grid" id="todo-grid">
    <p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">Loading…</p>
  </div>
  <div id="todos-pager"></div>
</div>

<!-- Modal -->
<div class="todo-overlay" id="todo-overlay" onclick="if(event.target===this)closeModal()">
  <div class="todo-modal">
    <h3 id="modal-heading">New To-Do List</h3>
    <div style="margin-bottom:12px;">
      <label>List Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Follow-up tasks">
    </div>
    <div>
      <label style="display:flex;justify-content:space-between;align-items:center;">
        Items
        <button type="button" onclick="addModalItem()" style="background:#1a3a5c;color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;">+ Add Item</button>
      </label>
      <div class="modal-items-list" id="modal-items"></div>
    </div>
    <div>
      <label>Card Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <div class="modal-actions">
      <button id="btn-delete" style="display:none;background:#c62828;color:#fff;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="deleteList()">Delete</button>
      <button style="background:#ccc;color:#333;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveList()">Save</button>
    </div>
  </div>
</div>

<script src="/js/pagination.js"></script>
<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  const COLORS = ['#ffffff','#fff9c4','#d4edda','#d1ecf1','#f8d7da','#e2d9f3','#fce4d6','#e8f0fe'];
  let editingId   = null;
  let chosenColor = '#ffffff';
  let allLists    = [];
  let _todosPage  = 1;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''; }

  // Build color swatches
  const colorRow = document.getElementById('color-row');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === '#ffffff' ? ' selected' : '');
    sw.style.background = c;
    sw.style.border = c === '#ffffff' ? '2px solid #ccc' : '2px solid transparent';
    sw.onclick = () => {
      chosenColor = c;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    colorRow.appendChild(sw);
  });

  function setColor(c) {
    chosenColor = c;
    document.querySelectorAll('.color-swatch').forEach((sw, i) => sw.classList.toggle('selected', COLORS[i] === c));
  }

  async function load() {
    allLists = await api.getTodos();
    renderGrid();
  }

  function goTodosPage(p) { _todosPage = p; renderGrid(); }

  function renderGrid() {
    const grid = document.getElementById('todo-grid');
    if (!allLists.length) {
      grid.innerHTML = '<p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">No to-do lists yet. Click + New List to start.</p>';
      document.getElementById('todos-pager').innerHTML = '';
      return;
    }
    grid.innerHTML = pageSlice(allLists, _todosPage).map(list => {
      const total = (list.items||[]).length;
      const done  = (list.items||[]).filter(i => i.done).length;
      const pct   = total > 0 ? Math.round(done/total*100) : 0;
      const items = (list.items||[]).slice(0, 6);
      return `<div class="todo-card" style="background:${list.color||'#fff'};">
        <span class="todo-pin ${list.pinned?'pinned':''}" title="${list.pinned?'Unpin':'Pin'}" onclick="togglePin('${list._id}',${!list.pinned})">📌</span>
        <button class="todo-del" title="Delete" onclick="confirmDelete('${list._id}')">×</button>
        <div class="todo-card-title" onclick="openModal('${list._id}')">${esc(list.title)}</div>
        ${total ? `<div class="todo-progress"><div class="todo-progress-bar" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:#777;">${done}/${total} done</div>` : ''}
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${items.map(item => `
            <div class="todo-item-row">
              <input type="checkbox" ${item.done?'checked':''} onchange="toggleItem('${list._id}','${item._id}',this.checked)">
              <span class="todo-item-label ${item.done?'done':''}">${esc(item.text)}</span>
            </div>`).join('')}
          ${list.items.length > 6 ? `<div style="font-size:11px;color:#aaa;padding-left:24px;">+${list.items.length-6} more…</div>` : ''}
        </div>
        <div class="todo-card-date">${fmtDate(list.updatedAt)}</div>
      </div>`;
    }).join('');
    renderPager('todos-pager', allLists.length, _todosPage, 'goTodosPage');
  }

  async function toggleItem(listId, itemId, done) {
    const list = allLists.find(l => l._id === listId);
    if (!list) return;
    const items = list.items.map(i => i._id === itemId ? {...i, done} : i);
    try { await api.updateTodo(listId, { items }); await load(); } catch (err) { alert(err.message); }
  }

  function addModalItem(text, done) {
    const list = document.getElementById('modal-items');
    const row  = document.createElement('div');
    row.className = 'modal-item-row';
    row.innerHTML = `
      <input type="checkbox" ${done?'checked':''}>
      <input type="text" value="${esc(text||'')}" placeholder="Task item…">
      <button type="button" class="modal-item-del" onclick="this.parentElement.remove()">×</button>`;
    list.appendChild(row);
    row.querySelector('input[type="text"]').focus();
  }

  function getModalItems() {
    return [...document.querySelectorAll('#modal-items .modal-item-row')].map(row => ({
      text: row.querySelector('input[type="text"]').value.trim(),
      done: row.querySelector('input[type="checkbox"]').checked,
    })).filter(i => i.text);
  }

  function openModal(id) {
    editingId = id || null;
    document.getElementById('modal-heading').textContent = id ? 'Edit To-Do List' : 'New To-Do List';
    document.getElementById('btn-delete').style.display = id ? 'inline-block' : 'none';
    document.getElementById('f-title').value = '';
    document.getElementById('modal-items').innerHTML = '';
    setColor('#ffffff');

    if (id) {
      const list = allLists.find(l => l._id === id);
      if (list) {
        document.getElementById('f-title').value = list.title || '';
        setColor(list.color || '#ffffff');
        (list.items || []).forEach(i => addModalItem(i.text, i.done));
      }
    }
    document.getElementById('todo-overlay').classList.add('open');
    document.getElementById('f-title').focus();
  }

  function closeModal() {
    document.getElementById('todo-overlay').classList.remove('open');
    editingId = null;
  }

  async function saveList() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const body = { title, items: getModalItems(), color: chosenColor };
    try {
      if (editingId) await api.updateTodo(editingId, body);
      else await api.createTodo(body);
      closeModal();
      await load();
    } catch (err) { alert(err.message); }
  }

  async function togglePin(id, pinned) {
    try { await api.updateTodo(id, { pinned }); await load(); } catch (err) { alert(err.message); }
  }

  async function confirmDelete(id) {
    if (!confirm('Delete this list?')) return;
    try { await api.deleteTodo(id); await load(); } catch (err) { alert(err.message); }
  }

  async function deleteList() {
    if (!editingId || !confirm('Delete this list?')) return;
    try { await api.deleteTodo(editingId); closeModal(); await load(); } catch (err) { alert(err.message); }
  }

  load();
</script>
</body>
</html>
