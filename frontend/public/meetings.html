<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetings — CoreSales CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css">
  <style>
    /* ── Calendar ── */
    #calendar { background:#fff; border-radius:6px; padding:16px; border:1px solid #d0d8e4; }
    .fc .fc-button-primary { background:#1a3a5c; border-color:#1a3a5c; }
    .fc .fc-button-primary:hover { background:#14304f; border-color:#14304f; }
    .fc .fc-button-primary:not(:disabled).fc-button-active { background:#0d2137; border-color:#0d2137; }
    .fc .fc-daygrid-day.fc-day-today { background:#eaf1fb; }
    .fc .fc-toolbar-title { font-size:16px; font-weight:700; color:#1a3a5c; }

    /* ── Meeting modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:8px; padding:28px 32px; width:520px; max-width:96vw; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.22); }
    .modal-box h3 { margin:0 0 18px; font-size:16px; color:#1a3a5c; text-transform:uppercase; letter-spacing:1px; }
    .mform { display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; }
    .mform .full { grid-column:1/-1; }
    .mform label { font-size:12px; font-weight:600; color:#444; display:block; margin-bottom:3px; }
    .mform input, .mform select, .mform textarea { width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #c0c8d4; border-radius:4px; font-size:13px; }
    .mform textarea { resize:vertical; min-height:64px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
    .btn-danger { background:#c62828; color:#fff; border:none; padding:7px 18px; border-radius:4px; cursor:pointer; font-size:13px; }
    .btn-danger:hover { background:#b71c1c; }
    .badge-scheduled { background:#1a3a5c; color:#fff; }
    .badge-completed  { background:#2e7d32; color:#fff; }
    .badge-cancelled  { background:#c62828; color:#fff; }

    /* ── Meeting todo rows (inside meeting modal) ── */
    .mtodo-row { display:flex; align-items:center; gap:8px; }
    .mtodo-row input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; cursor:pointer; }
    .mtodo-row input[type="text"] { flex:1; padding:5px 8px; border:1px solid #c0c8d4; border-radius:4px; font-size:13px; }
    .mtodo-row input[type="text"].done-text { text-decoration:line-through; color:#aaa; }
    .mtodo-remove { background:none; border:none; color:#c62828; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; }

    /* ── To-Do tab ── */
    .todo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .todo-card { border-radius:8px; padding:16px; border:1px solid #d0d8e4; box-shadow:0 2px 6px rgba(0,0,0,.06); position:relative; display:flex; flex-direction:column; gap:10px; transition:box-shadow .15s; }
    .todo-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.12); }
    .todo-card-title { font-size:14px; font-weight:700; color:#1a3a5c; cursor:pointer; word-break:break-word; padding-right:44px; }
    .todo-item-row { display:flex; align-items:center; gap:8px; }
    .todo-item-row input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; cursor:pointer; }
    .todo-item-label { font-size:13px; color:#333; }
    .todo-item-label.done { text-decoration:line-through; color:#aaa; }
    .todo-progress { height:6px; background:#e0e0e0; border-radius:3px; overflow:hidden; }
    .todo-progress-bar { height:100%; background:#2e7d32; border-radius:3px; transition:width .3s; }
    .card-date { font-size:11px; color:#aaa; margin-top:auto; }
    .card-pin { position:absolute; top:10px; right:36px; font-size:15px; cursor:pointer; opacity:.5; }
    .card-pin.pinned { opacity:1; color:#e65100; }
    .card-del { position:absolute; top:8px; right:10px; background:none; border:none; color:#ccc; font-size:16px; cursor:pointer; }
    .card-del:hover { color:#c62828; }
    .modal-item-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .modal-item-row input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; }
    .modal-item-row input[type="text"] { flex:1; padding:7px 10px; border:1px solid #c0c8d4; border-radius:4px; font-size:13px; }
    .modal-item-del { background:none; border:none; color:#c62828; font-size:16px; cursor:pointer; padding:0 4px; }

    /* ── Notes tab ── */
    .notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .note-card { border-radius:8px; padding:16px; border:1px solid #d0d8e4; box-shadow:0 2px 6px rgba(0,0,0,.06); position:relative; display:flex; flex-direction:column; gap:8px; cursor:pointer; transition:box-shadow .15s; }
    .note-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.12); }
    .note-card-title { font-size:14px; font-weight:700; color:#1a3a5c; word-break:break-word; }
    .note-card-body { font-size:13px; color:#444; white-space:pre-wrap; word-break:break-word; max-height:120px; overflow:hidden; }

    /* ── Shared color swatches ── */
    .color-row { display:flex; gap:8px; margin:10px 0 16px; flex-wrap:wrap; }
    .color-swatch { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
    .color-swatch.selected { border-color:#1a3a5c; }
  </style>
  <link rel="stylesheet" href="/css/mobile.css">
  <script src="/js/mobile-nav.js" defer></script>
</head>
<body>

<div class="topbar no-print">
  <a href="/dashboard.html" class="brand">CoreSales CRM</a>
  <div class="user-info">
    <span id="topbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>
<nav class="subnav">
  <a href="/contacts.html">Contacts</a>
  <a href="/products.html">Products</a>
  <a href="/orders.html">Orders</a>
  <a href="/pricing.html">Pricing</a>
  <a href="/samples.html">Samples</a>
  <a href="/lc-tracker.html">Trade Docs</a>
  <a href="/forecast.html">Forecast</a>
  <a href="/reports.html">Reports</a>
  <a href="/meetings.html" class="active">Meetings</a>
  <a href="/settings.html">Settings</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h2>Meetings</h2>
    <button class="btn-new" id="btn-new" onclick="newItem()">+ New Meeting</button>
  </div>

  <!-- Inner tabs -->
  <div class="inner-tabs">
    <button class="inner-tab active" onclick="switchTab('calendar',this)">📅 Calendar</button>
    <button class="inner-tab" onclick="switchTab('todos',this)">✅ To-Do</button>
    <button class="inner-tab" onclick="switchTab('notes',this)">📝 Notes</button>
  </div>

  <!-- TAB: Calendar -->
  <div id="tab-calendar" class="tab-panel">
    <div id="calendar" style="margin-bottom:24px;"></div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Title</th><th>Date &amp; Time</th><th>Type</th>
          <th>Contact</th><th>Status</th><th>Location</th><th></th>
        </tr>
      </thead>
      <tbody id="meetings-tbody"></tbody>
    </table>
  </div>

  <!-- TAB: To-Do -->
  <div id="tab-todos" class="tab-panel" style="display:none;">
    <div class="todo-grid" id="todo-grid">
      <p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">Loading…</p>
    </div>
  </div>

  <!-- TAB: Notes -->
  <div id="tab-notes" class="tab-panel" style="display:none;">
    <div class="notes-grid" id="notes-grid">
      <p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">Loading…</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MEETING MODAL
════════════════════════════════════════════ -->
<div class="modal-overlay" id="meeting-overlay" onclick="if(event.target===this)closeMeetingModal()">
  <div class="modal-box">
    <h3 id="meeting-modal-title">New Meeting</h3>
    <form id="meeting-form">
      <div class="mform">
        <div class="full"><label>Title *</label><input type="text" id="f-title" required></div>
        <div><label>Date *</label><input type="date" id="f-date" required></div>
        <div><label>Time *</label><input type="time" id="f-time" required></div>
        <div><label>Duration (min)</label><input type="number" id="f-duration" value="60" min="5" step="5"></div>
        <div><label>Type</label>
          <select id="f-type">
            <option>Meeting</option><option>Call</option><option>Video Call</option>
            <option>Site Visit</option><option>Other</option>
          </select>
        </div>
        <div><label>Status</label>
          <select id="f-status">
            <option>Scheduled</option><option>Completed</option><option>Cancelled</option>
          </select>
        </div>
        <div><label>Contact</label><select id="f-contact"><option value="">— None —</option></select></div>
        <div><label>Location</label><input type="text" id="f-location" placeholder="Office / Zoom / etc."></div>
        <div class="full"><label>Notes</label><textarea id="f-notes" placeholder="Agenda, outcomes…"></textarea></div>
        <div class="full">
          <label style="display:flex;justify-content:space-between;align-items:center;">
            To-Do Items
            <button type="button" onclick="addMtodoRow()" style="background:#1a3a5c;color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;">+ Add Item</button>
          </label>
          <div id="mtodo-list" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="meeting-btn-delete" style="display:none;" onclick="deleteMeeting()">Delete</button>
        <button type="button" onclick="closeMeetingModal()" style="background:#ccc;color:#333;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════════════════════════════════════
     TO-DO MODAL
════════════════════════════════════════════ -->
<div class="modal-overlay" id="todo-overlay" onclick="if(event.target===this)closeTodoModal()">
  <div class="modal-box">
    <h3 id="todo-modal-title">New To-Do List</h3>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:3px;">List Title *</label>
      <input type="text" id="td-title" placeholder="e.g. Follow-up tasks" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #c0c8d4;border-radius:4px;font-size:13px;">
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:#444;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        Items
        <button type="button" onclick="addTodoModalItem()" style="background:#1a3a5c;color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;">+ Add Item</button>
      </label>
      <div id="td-items"></div>
    </div>
    <div>
      <label style="font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:3px;">Card Color</label>
      <div class="color-row" id="color-row-todo"></div>
    </div>
    <div class="modal-actions">
      <button id="todo-btn-delete" style="display:none;background:#c62828;color:#fff;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="deleteTodoList()">Delete</button>
      <button style="background:#ccc;color:#333;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="closeTodoModal()">Cancel</button>
      <button class="btn-save" onclick="saveTodoList()">Save</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     NOTE MODAL
════════════════════════════════════════════ -->
<div class="modal-overlay" id="note-overlay" onclick="if(event.target===this)closeNoteModal()">
  <div class="modal-box" style="width:560px;">
    <h3 id="note-modal-title">New Note</h3>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:3px;">Title *</label>
      <input type="text" id="nt-title" placeholder="Note title" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #c0c8d4;border-radius:4px;font-size:13px;">
    </div>
    <div style="margin-bottom:4px;">
      <label style="font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:3px;">Content</label>
      <textarea id="nt-content" placeholder="Write your note here…" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #c0c8d4;border-radius:4px;font-size:13px;resize:vertical;min-height:200px;font-family:inherit;"></textarea>
    </div>
    <div>
      <label style="font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:3px;">Card Color</label>
      <div class="color-row" id="color-row-note"></div>
    </div>
    <div class="modal-actions">
      <button id="note-btn-delete" style="display:none;background:#c62828;color:#fff;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="deleteNote()">Delete</button>
      <button style="background:#ccc;color:#333;border:none;padding:7px 18px;border-radius:4px;cursor:pointer;font-size:13px;" onclick="closeNoteModal()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || !localStorage.getItem('token')) location.replace('/index.html');
  document.getElementById('topbar-name').textContent = user.name || user.username;
  function logout() { localStorage.clear(); location.replace('/index.html'); }

  // ── Shared ──────────────────────────────────────────────────
  const COLORS = ['#ffffff','#fff9c4','#d4edda','#d1ecf1','#f8d7da','#e2d9f3','#fce4d6','#e8f0fe'];
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''; }
  function fmtDateTime(d) { return d ? new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }

  function buildSwatches(containerId, getColor, setColor) {
    const row = document.getElementById(containerId);
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c === '#ffffff' ? ' selected' : '');
      sw.style.background = c;
      sw.style.border = c === '#ffffff' ? '2px solid #ccc' : '2px solid transparent';
      sw.onclick = () => {
        setColor(c);
        row.querySelectorAll('.color-swatch').forEach(s => { s.classList.remove('selected'); s.style.border = COLORS[COLORS.indexOf(s.style.background)] === '#ffffff' ? '2px solid #ccc' : '2px solid transparent'; });
        sw.classList.add('selected'); sw.style.border = '2px solid #1a3a5c';
      };
      row.appendChild(sw);
    });
  }
  function syncSwatches(containerId, color) {
    document.querySelectorAll(`#${containerId} .color-swatch`).forEach((sw, i) => {
      const match = COLORS[i] === color;
      sw.classList.toggle('selected', match);
      sw.style.border = match ? '2px solid #1a3a5c' : (COLORS[i] === '#ffffff' ? '2px solid #ccc' : '2px solid transparent');
    });
  }

  let activeTab = 'calendar';
  const NEW_BTN_LABELS = { calendar: '+ New Meeting', todos: '+ New List', notes: '+ New Note' };

  function switchTab(name, btn) {
    activeTab = name;
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.inner-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).style.display = '';
    btn.classList.add('active');
    document.getElementById('btn-new').textContent = NEW_BTN_LABELS[name];
    if (name === 'todos' && !todosLoaded) { loadTodos(); todosLoaded = true; }
    if (name === 'notes' && !notesLoaded) { loadNotes(); notesLoaded = true; }
    if (name === 'calendar') calendar.updateSize();
  }

  function newItem() {
    if (activeTab === 'calendar') openMeetingModal();
    else if (activeTab === 'todos') openTodoModal();
    else openNoteModal();
  }

  // ── MEETINGS ─────────────────────────────────────────────────
  const STATUS_COLOR = { Scheduled:'#1a3a5c', Completed:'#2e7d32', Cancelled:'#c62828' };
  let calendar;
  let allMeetings = [];
  let meetingEditId = null;

  async function loadMeetings() {
    allMeetings = await api.getMeetings();
    renderMeetingTable();
    calendar.removeAllEvents();
    calendar.addEventSource(allMeetings.map(m => ({
      id: m._id, title: m.title, start: m.date,
      end: m.duration ? new Date(new Date(m.date).getTime() + m.duration*60000).toISOString() : undefined,
      backgroundColor: STATUS_COLOR[m.status]||'#1a3a5c',
      borderColor: STATUS_COLOR[m.status]||'#1a3a5c',
    })));
  }

  function renderMeetingTable() {
    const tbody = document.getElementById('meetings-tbody');
    if (!allMeetings.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:20px;">No meetings yet</td></tr>';
      return;
    }
    tbody.innerHTML = allMeetings.map(m => {
      const contact = m.contact ? (m.contact.company||m.contact.name||'') : '—';
      return `<tr>
        <td><a href="#" onclick="openMeetingModal('${m._id}');return false;">${esc(m.title)}</a></td>
        <td>${fmtDateTime(m.date)}</td>
        <td>${esc(m.type)}</td>
        <td>${esc(contact)}</td>
        <td><span class="badge badge-${(m.status||'scheduled').toLowerCase()}">${esc(m.status)}</span></td>
        <td>${esc(m.location||'—')}</td>
        <td><button class="btn-sm btn-edit" onclick="openMeetingModal('${m._id}')">Edit</button></td>
      </tr>`;
    }).join('');
  }

  async function openMeetingModal(id, prefillDate) {
    meetingEditId = id || null;
    document.getElementById('meeting-modal-title').textContent = id ? 'Edit Meeting' : 'New Meeting';
    document.getElementById('meeting-btn-delete').style.display = id ? 'inline-block' : 'none';
    clearMeetingForm();
    if (id) {
      const m = await api.getMeeting(id);
      const d = new Date(m.date);
      document.getElementById('f-title').value    = m.title||'';
      document.getElementById('f-date').value     = d.toISOString().slice(0,10);
      document.getElementById('f-time').value     = d.toTimeString().slice(0,5);
      document.getElementById('f-duration').value = m.duration||60;
      document.getElementById('f-type').value     = m.type||'Meeting';
      document.getElementById('f-status').value   = m.status||'Scheduled';
      document.getElementById('f-location').value = m.location||'';
      document.getElementById('f-notes').value    = m.notes||'';
      (m.todoItems||[]).forEach(t => addMtodoRow(t.text, t.done));
      if (m.contact) document.getElementById('f-contact').value = m.contact._id||m.contact;
    } else if (prefillDate) {
      document.getElementById('f-date').value = prefillDate.slice(0,10);
      if (prefillDate.length > 10) document.getElementById('f-time').value = prefillDate.slice(11,16);
    }
    document.getElementById('meeting-overlay').classList.add('open');
  }

  function closeMeetingModal() { document.getElementById('meeting-overlay').classList.remove('open'); meetingEditId = null; }

  function clearMeetingForm() {
    ['f-title','f-date','f-time','f-location','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-duration').value = 60;
    document.getElementById('f-type').value = 'Meeting';
    document.getElementById('f-status').value = 'Scheduled';
    document.getElementById('f-contact').value = '';
    document.getElementById('mtodo-list').innerHTML = '';
  }

  function addMtodoRow(text, done) {
    const list = document.getElementById('mtodo-list');
    const row  = document.createElement('div');
    row.className = 'mtodo-row';
    row.innerHTML = `
      <input type="checkbox" ${done?'checked':''} onchange="this.nextElementSibling.classList.toggle('done-text',this.checked)">
      <input type="text" value="${esc(text||'')}" placeholder="To-do item…" class="${done?'done-text':''}">
      <button type="button" class="mtodo-remove" onclick="this.parentElement.remove()">×</button>`;
    list.appendChild(row);
  }

  function getMtodoItems() {
    return [...document.querySelectorAll('#mtodo-list .mtodo-row')].map(row => ({
      text: row.querySelector('input[type="text"]').value.trim(),
      done: row.querySelector('input[type="checkbox"]').checked,
    })).filter(t => t.text);
  }

  document.getElementById('meeting-form').addEventListener('submit', async e => {
    e.preventDefault();
    const dateStr = document.getElementById('f-date').value;
    const timeStr = document.getElementById('f-time').value || '09:00';
    const body = {
      title:     document.getElementById('f-title').value.trim(),
      date:      new Date(`${dateStr}T${timeStr}`).toISOString(),
      duration:  Number(document.getElementById('f-duration').value)||60,
      type:      document.getElementById('f-type').value,
      status:    document.getElementById('f-status').value,
      contact:   document.getElementById('f-contact').value||undefined,
      location:  document.getElementById('f-location').value.trim()||undefined,
      notes:     document.getElementById('f-notes').value.trim()||undefined,
      todoItems: getMtodoItems(),
    };
    try {
      if (meetingEditId) await api.updateMeeting(meetingEditId, body);
      else await api.createMeeting(body);
      closeMeetingModal();
      await loadMeetings();
    } catch (err) { alert(err.message); }
  });

  async function deleteMeeting() {
    if (!meetingEditId || !confirm('Delete this meeting?')) return;
    try { await api.deleteMeeting(meetingEditId); closeMeetingModal(); await loadMeetings(); }
    catch (err) { alert(err.message); }
  }

  // ── TO-DO ────────────────────────────────────────────────────
  let allTodos    = [];
  let todoEditId  = null;
  let todoColor   = '#ffffff';
  let todosLoaded = false;

  buildSwatches('color-row-todo', () => todoColor, c => todoColor = c);

  async function loadTodos() {
    allTodos = await api.getTodos();
    renderTodoGrid();
  }

  function renderTodoGrid() {
    const grid = document.getElementById('todo-grid');
    if (!allTodos.length) {
      grid.innerHTML = '<p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">No to-do lists yet. Click + New List to start.</p>';
      return;
    }
    grid.innerHTML = allTodos.map(list => {
      const total = (list.items||[]).length;
      const done  = (list.items||[]).filter(i => i.done).length;
      const pct   = total > 0 ? Math.round(done/total*100) : 0;
      const items = (list.items||[]).slice(0,6);
      return `<div class="todo-card" style="background:${list.color||'#fff'};">
        <span class="card-pin ${list.pinned?'pinned':''}" onclick="toggleTodoPin('${list._id}',${!list.pinned})">📌</span>
        <button class="card-del" onclick="confirmTodoDelete('${list._id}')">×</button>
        <div class="todo-card-title" onclick="openTodoModal('${list._id}')">${esc(list.title)}</div>
        ${total ? `<div class="todo-progress"><div class="todo-progress-bar" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:#777;">${done}/${total} done</div>` : ''}
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${items.map(item => `
            <div class="todo-item-row">
              <input type="checkbox" ${item.done?'checked':''} onchange="toggleTodoItem('${list._id}','${item._id}',this.checked)">
              <span class="todo-item-label ${item.done?'done':''}">${esc(item.text)}</span>
            </div>`).join('')}
          ${list.items.length > 6 ? `<div style="font-size:11px;color:#aaa;padding-left:24px;">+${list.items.length-6} more…</div>` : ''}
        </div>
        <div class="card-date">${fmtDate(list.updatedAt)}</div>
      </div>`;
    }).join('');
  }

  function openTodoModal(id) {
    todoEditId = id || null;
    document.getElementById('todo-modal-title').textContent = id ? 'Edit To-Do List' : 'New To-Do List';
    document.getElementById('todo-btn-delete').style.display = id ? 'inline-block' : 'none';
    document.getElementById('td-title').value = '';
    document.getElementById('td-items').innerHTML = '';
    todoColor = '#ffffff'; syncSwatches('color-row-todo', todoColor);
    if (id) {
      const list = allTodos.find(l => l._id === id);
      if (list) {
        document.getElementById('td-title').value = list.title||'';
        todoColor = list.color||'#ffffff'; syncSwatches('color-row-todo', todoColor);
        (list.items||[]).forEach(i => addTodoModalItem(i.text, i.done));
      }
    }
    document.getElementById('todo-overlay').classList.add('open');
    document.getElementById('td-title').focus();
  }

  function closeTodoModal() { document.getElementById('todo-overlay').classList.remove('open'); todoEditId = null; }

  function addTodoModalItem(text, done) {
    const row = document.createElement('div');
    row.className = 'modal-item-row';
    row.innerHTML = `
      <input type="checkbox" ${done?'checked':''}>
      <input type="text" value="${esc(text||'')}" placeholder="Task item…">
      <button type="button" class="modal-item-del" onclick="this.parentElement.remove()">×</button>`;
    document.getElementById('td-items').appendChild(row);
    row.querySelector('input[type="text"]').focus();
  }

  function getTodoModalItems() {
    return [...document.querySelectorAll('#td-items .modal-item-row')].map(row => ({
      text: row.querySelector('input[type="text"]').value.trim(),
      done: row.querySelector('input[type="checkbox"]').checked,
    })).filter(i => i.text);
  }

  async function saveTodoList() {
    const title = document.getElementById('td-title').value.trim();
    if (!title) { document.getElementById('td-title').focus(); return; }
    const body = { title, items: getTodoModalItems(), color: todoColor };
    try {
      if (todoEditId) await api.updateTodo(todoEditId, body);
      else await api.createTodo(body);
      closeTodoModal(); await loadTodos();
    } catch (err) { alert(err.message); }
  }

  async function toggleTodoItem(listId, itemId, done) {
    const list = allTodos.find(l => l._id === listId);
    if (!list) return;
    const items = list.items.map(i => i._id === itemId ? {...i, done} : i);
    try { await api.updateTodo(listId, { items }); await loadTodos(); } catch (err) { alert(err.message); }
  }

  async function toggleTodoPin(id, pinned) {
    try { await api.updateTodo(id, { pinned }); await loadTodos(); } catch (err) { alert(err.message); }
  }

  async function confirmTodoDelete(id) {
    if (!confirm('Delete this list?')) return;
    try { await api.deleteTodo(id); await loadTodos(); } catch (err) { alert(err.message); }
  }

  async function deleteTodoList() {
    if (!todoEditId || !confirm('Delete this list?')) return;
    try { await api.deleteTodo(todoEditId); closeTodoModal(); await loadTodos(); } catch (err) { alert(err.message); }
  }

  // ── NOTES ────────────────────────────────────────────────────
  let allNotes    = [];
  let noteEditId  = null;
  let noteColor   = '#ffffff';
  let notesLoaded = false;

  buildSwatches('color-row-note', () => noteColor, c => noteColor = c);

  async function loadNotes() {
    allNotes = await api.getNotes();
    renderNotesGrid();
  }

  function renderNotesGrid() {
    const grid = document.getElementById('notes-grid');
    if (!allNotes.length) {
      grid.innerHTML = '<p style="color:#aaa;grid-column:1/-1;text-align:center;padding:40px;">No notes yet. Click + New Note to start.</p>';
      return;
    }
    grid.innerHTML = allNotes.map(n => `
      <div class="note-card" style="background:${n.color||'#fff'};" onclick="openNoteModal('${n._id}')">
        <span class="card-pin ${n.pinned?'pinned':''}" onclick="event.stopPropagation();toggleNotePin('${n._id}',${!n.pinned})">📌</span>
        <button class="card-del" onclick="event.stopPropagation();confirmNoteDelete('${n._id}')">×</button>
        <div class="note-card-title">${esc(n.title)}</div>
        ${n.content ? `<div class="note-card-body">${esc(n.content)}</div>` : ''}
        <div class="card-date">${fmtDate(n.updatedAt)}</div>
      </div>`).join('');
  }

  function openNoteModal(id) {
    noteEditId = id || null;
    document.getElementById('note-modal-title').textContent = id ? 'Edit Note' : 'New Note';
    document.getElementById('note-btn-delete').style.display = id ? 'inline-block' : 'none';
    document.getElementById('nt-title').value   = '';
    document.getElementById('nt-content').value = '';
    noteColor = '#ffffff'; syncSwatches('color-row-note', noteColor);
    if (id) {
      const n = allNotes.find(x => x._id === id);
      if (n) {
        document.getElementById('nt-title').value   = n.title||'';
        document.getElementById('nt-content').value = n.content||'';
        noteColor = n.color||'#ffffff'; syncSwatches('color-row-note', noteColor);
      }
    }
    document.getElementById('note-overlay').classList.add('open');
    document.getElementById('nt-title').focus();
  }

  function closeNoteModal() { document.getElementById('note-overlay').classList.remove('open'); noteEditId = null; }

  async function saveNote() {
    const title = document.getElementById('nt-title').value.trim();
    if (!title) { document.getElementById('nt-title').focus(); return; }
    const body = { title, content: document.getElementById('nt-content').value.trim(), color: noteColor };
    try {
      if (noteEditId) await api.updateNote(noteEditId, body);
      else await api.createNote(body);
      closeNoteModal(); await loadNotes();
    } catch (err) { alert(err.message); }
  }

  async function toggleNotePin(id, pinned) {
    try { await api.updateNote(id, { pinned }); await loadNotes(); } catch (err) { alert(err.message); }
  }

  async function confirmNoteDelete(id) {
    if (!confirm('Delete this note?')) return;
    try { await api.deleteNote(id); await loadNotes(); } catch (err) { alert(err.message); }
  }

  async function deleteNote() {
    if (!noteEditId || !confirm('Delete this note?')) return;
    try { await api.deleteNote(noteEditId); closeNoteModal(); await loadNotes(); } catch (err) { alert(err.message); }
  }

  // ── INIT ────────────────────────────────────────────────────
  async function init() {
    try {
      const contacts = await api.getContacts();
      const sel = document.getElementById('f-contact');
      contacts.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c._id;
        opt.textContent = c.company||c.name;
        sel.appendChild(opt);
      });
    } catch (_) {}

    const calEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'dayGridMonth',
      headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay,listWeek' },
      height: 520,
      events: [],
      dateClick(info) { openMeetingModal(null, info.dateStr); },
      eventClick(info) { openMeetingModal(info.event.id); },
    });
    calendar.render();
    await loadMeetings();
  }

  init();
</script>
</body>
</html>
